<!DOCTYPE html>

<html>
<head>
<title>QR Billing Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6f9;
}

.container-box{
display:flex;
height:100vh;
}

/* LEFT SIDE */

.left-side{
width:50%;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
padding:60px;
}

.form-box{
width:380px;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:25px;
cursor:pointer;
transition:0.3s;
}

.logo:hover{
transform:translateY(-3px) scale(1.05);
}

.logo-icon{
width:45px;
height:45px;
background:#1f8a70;
color:white;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
transition:0.3s;
}

.logo:hover .logo-icon{
background:#136a8a;
transform:rotate(-10deg);
}

/* INPUT */

.form-control{
height:45px;
border-radius:8px;
border:1px solid #dee2e6;
}

.form-control:focus{
border-color:#1f8a70;
box-shadow:0 0 0 2px rgba(31,138,112,0.2);
}

/* ERROR */

.error-input{
border:1px solid red !important;
}

.error-msg{
display:block;
margin-top:5px;
font-size:13px;
}

/* BUTTON */

.btn-custom{
background:linear-gradient(135deg,#1f8a70,#136a8a);
color:white;
height:45px;
border-radius:8px;
border:none;
font-weight:500;
transition:0.3s;
}

.btn-custom:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* RIGHT SIDE */

.right-side{
width:50%;
background:linear-gradient(135deg,#1f8a70,#136a8a);
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* SHAPES */

.shape{
position:absolute;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(8px);

box-shadow:
inset -6px -6px 12px rgba(255,255,255,0.2),
inset 6px 6px 12px rgba(0,0,0,0.25),
0 20px 30px rgba(0,0,0,0.25);

animation:float 7s ease-in-out infinite;
}

.circle-big{
width:200px;
height:200px;
border-radius:50%;
top:60px;
left:80px;
}

.square{
width:170px;
height:170px;
border-radius:25px;
bottom:80px;
right:80px;
}

.circle-small{
width:80px;
height:80px;
border-radius:50%;
bottom:180px;
left:300px;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0px)}
}

.right-content{
z-index:2;
max-width:380px;
}

.big-icon{
width:90px;
height:90px;
background:rgba(255,255,255,0.2);
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
margin:0 auto 20px;
}

/* PASSWORD EYE ICON */

.password-box{
position:relative;
}

.password-box i{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#888;
}

</style>

</head>

<body>

<div class="container-box">

<!-- LEFT -->

<div class="left-side">

<div class="form-box">

<div class="logo">
<div class="logo-icon">
<i class="fa-solid fa-qrcode"></i>
</div>
<h5 class="mb-0 fw-bold">QR Billing</h5>
</div>

<h2>Welcome Back</h2>
<p class="text-muted mb-4">Login to manage your billing</p>

<form method="POST" id="loginForm">
{% csrf_token %}

<input type="text" name="username" class="form-control mb-2" placeholder="Username">

<div class="password-box mb-2">
<input type="password" name="password" class="form-control" placeholder="Password">
<i class="fa-solid fa-eye" onclick="togglePassword(this)"></i>
</div>

<div class="form-check mb-3">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">Remember me</label>
</div>

<button type="submit" class="btn btn-custom w-100">Sign In</button>

</form>

<div class="text-center mt-4">
<small>
Don't have an account?
<a href="{% url 'register' %}">Create Account</a>
</small>
</div>

</div>
</div>

<!-- RIGHT -->

<div class="right-side">

<div class="shape circle-big"></div>
<div class="shape square"></div>
<div class="shape circle-small"></div>

<div class="right-content">

<div class="big-icon">
<i class="fa-solid fa-qrcode"></i>
</div>

<h1 class="fw-bold">Manage Your Business</h1>

<p>
Billing, invoices, QR codes — all in one place.<br>
Simple and powerful.
</p>

</div>
</div>

</div>

<!-- ✅ JAVASCRIPT FIXED -->

<script>

// FORM VALIDATION
document.getElementById("loginForm").addEventListener("submit", function(e){

let isValid = true;

const username = document.querySelector("input[name='username']");
const password = document.querySelector("input[name='password']");

// remove old errors
document.querySelectorAll(".error-msg").forEach(el => el.remove());
document.querySelectorAll(".form-control").forEach(el => el.classList.remove("error-input"));

// username
if(username.value.trim() === ""){
showError(username, "Username is required");
isValid = false;
}

// password
if(password.value.trim() === ""){
showError(password, "Password is required");
isValid = false;
}

if(!isValid){
e.preventDefault();
}

});

// ✅ FIXED ERROR POSITION
function showError(input, message){

const error = document.createElement("small");
error.className = "text-danger error-msg";
error.innerText = message;

input.classList.add("error-input");

// FIX: correct position
if(input.closest(".password-box")){
input.closest(".password-box").appendChild(error);
}else{
input.insertAdjacentElement("afterend", error);
}

}

// SHOW/HIDE PASSWORD
function togglePassword(icon){
const input = document.querySelector("input[name='password']");

if(input.type === "password"){
input.type = "text";
icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");
}else{
input.type = "password";
icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");
}
}

</script>

</body>
</html>
