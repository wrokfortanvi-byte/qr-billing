<!DOCTYPE html>
<html>
<head>
<title>Create Account - QR Billing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6f9;
}

.container-box{
display:flex;
height:100vh;
}

/* LEFT SIDE */

.left-side{
width:50%;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
padding:60px;
}

.form-box{
width:380px;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:25px;
cursor:pointer;
transition:0.3s;
}

.logo:hover{
transform:translateY(-3px) scale(1.05);
}

.logo-icon{
width:45px;
height:45px;
background:#1f8a70;
color:white;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
transition:0.3s;
}

.logo:hover .logo-icon{
background:#136a8a;
transform:rotate(-10deg);
}

/* INPUT */

.form-control{
height:45px;
border-radius:8px;
border:1px solid #dee2e6;
}

.form-control:focus{
border-color:#1f8a70;
box-shadow:0 0 0 2px rgba(31,138,112,0.2);
}

/* ERROR */

.error-input{
border:1px solid red !important;
}

.error-msg{
display:block;
margin-top:5px;
font-size:13px;
}

/* BUTTON */

.btn-custom{
background:linear-gradient(135deg,#1f8a70,#136a8a);
color:white;
height:45px;
border-radius:8px;
border:none;
font-weight:500;
transition:0.3s;
}

.btn-custom:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* RIGHT SIDE (UNCHANGED) */

.right-side{
width:50%;
background:linear-gradient(135deg,#1f8a70,#136a8a);
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

.shape{
position:absolute;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(8px);

box-shadow:
inset -6px -6px 12px rgba(255,255,255,0.2),
inset 6px 6px 12px rgba(0,0,0,0.25),
0 20px 30px rgba(0,0,0,0.25);

animation:float 7s ease-in-out infinite;
}

.circle-big{
width:200px;
height:200px;
border-radius:50%;
top:60px;
left:80px;
}

.square{
width:170px;
height:170px;
border-radius:25px;
bottom:80px;
right:80px;
}

.circle-small{
width:80px;
height:80px;
border-radius:50%;
bottom:180px;
left:300px;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0px)}
}

.right-content{
z-index:2;
max-width:380px;
}

.big-icon{
width:90px;
height:90px;
background:rgba(255,255,255,0.2);
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
margin:0 auto 20px;
}

</style>

</head>

<body>

<div class="container-box">

<!-- LEFT -->

<div class="left-side">

<div class="form-box">

<div class="logo">
<div class="logo-icon">
<i class="fa-solid fa-qrcode"></i>
</div>
<h5 class="mb-0 fw-bold">QR Billing</h5>
</div>

<h2>Create Account</h2>
<p class="text-muted mb-4">Start managing your billing</p>

<form method="POST" id="registerForm">
{% csrf_token %}

<input type="text" name="username" class="form-control mb-2" placeholder="Username">

<input type="email" name="email" class="form-control mb-2" placeholder="Email Address">

<input type="password" name="password" class="form-control mb-2" placeholder="Password">

<select name="user_type" class="form-control mb-2">
<option value="">Select Account Type</option>
<option value="customer">Customer</option>
<option value="admin">Admin</option>
</select>

<div class="form-check mb-3">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">I agree to Terms & Conditions</label>
</div>

<button type="submit" class="btn btn-custom w-100">Create Account</button>

</form>

<div class="text-center mt-4">
<small>
Already have an account?
<a href="{% url 'login' %}">Sign In</a>
</small>
</div>

</div>
</div>

<!-- RIGHT (SAME UI) -->

<div class="right-side">

<div class="shape circle-big"></div>
<div class="shape square"></div>
<div class="shape circle-small"></div>

<div class="right-content">
<div class="big-icon">
<i class="fa-solid fa-qrcode"></i>
</div>

<h1 class="fw-bold">Manage Your Business</h1>

<p>
Billing, invoices, QR codes — all in one place.<br>
Simple and powerful.
</p>

</div>
</div>

</div>

<!-- ✅ JAVASCRIPT (FIXED) -->

<script>

document.getElementById("registerForm").addEventListener("submit", function(e) {

let isValid = true;

const username = document.querySelector("input[name='username']");
const email = document.querySelector("input[name='email']");
const password = document.querySelector("input[name='password']");
const userType = document.querySelector("select[name='user_type']");
const checkbox = document.querySelector(".form-check-input");

// remove old errors
document.querySelectorAll(".error-msg").forEach(el => el.remove());
document.querySelectorAll(".form-control").forEach(el => el.classList.remove("error-input"));

// username
if (username.value.trim() === "") {
showError(username, "Username is required");
isValid = false;
}

// email
if (email.value.trim() === "") {
showError(email, "Email is required");
isValid = false;
}

// password
if (password.value.trim() === "") {
showError(password, "Password is required");
isValid = false;
}

// user type
if (userType.value === "") {
showError(userType, "Select account type");
isValid = false;
}

// checkbox
if (!checkbox.checked) {
showError(checkbox, "You must agree to terms");
isValid = false;
}

if (!isValid) {
e.preventDefault();
}

});

// ✅ FINAL FIX (IMPORTANT)
function showError(input, message){

const error = document.createElement("small");
error.className = "text-danger error-msg";
error.innerText = message;

input.classList.add("error-input");

if(input.type === "checkbox"){
input.parentNode.appendChild(error);
}else{
input.insertAdjacentElement("afterend", error);
}

}

</script>

</body>
</html>
